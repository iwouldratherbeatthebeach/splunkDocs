# Allow the dashboard shells to embed our static pages, and expose the custom
# REST endpoint to Splunk Web so the Configuration page can call it.
[settings]
dashboard_html_allow_embeddable_content = true
dashboard_html_allow_iframes = true
dashboard_html_allow_inline_styles = true

[expose:docs_admin]
pattern = docs_admin
methods = GET,POST

[expose:docs_admin_member]
pattern = docs_admin/*
methods = GET,POST
