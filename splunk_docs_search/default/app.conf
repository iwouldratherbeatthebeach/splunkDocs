#
# App configuration for the Splunk Docs Search app.
# Drop this app directory into $SPLUNK_HOME/etc/apps/ and restart Splunk.
#
[install]
is_configured = false
state = enabled

[ui]
is_visible = true
label = Splunk Docs Search

[launcher]
author = Aaron Johnson
description = Ingests, displays, and searches the full Splunk documentation set from help.splunk.com.
version = 1.0.0

[package]
id = splunk_docs_search
