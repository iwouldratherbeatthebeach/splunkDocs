#
# Splunk Docs Search — ingest, search, and read the Splunk documentation set.
# Drop into $SPLUNK_HOME/etc/apps/ and restart Splunk.
#
[install]
is_configured = false
state = enabled

[ui]
is_visible = true
label = Splunk Docs Search

[launcher]
author = Aaron Johnson
description = Crawl help.splunk.com into a searchable index with an embedded per-page PDF reader, grouped by product.
version = 2.0.0

[package]
id = splunk_docs_search
