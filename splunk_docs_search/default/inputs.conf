#
# Monitor input for the NDJSON shards written by ingest/fetch_splunk_docs.py.
# EDIT the path to match the crawler's --out directory, then set disabled=false.
#
[monitor:///opt/splunk/splunk_docs_ingest]
disabled   = true
index      = splunk_docs
sourcetype = splunk_docs
whitelist  = \.ndjson$
crcSalt    = <SOURCE>
