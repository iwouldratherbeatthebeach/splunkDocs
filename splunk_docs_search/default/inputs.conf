# Index the scraper's NDJSON so SPL Search works. The scraper writes
# docs.ndjson into the app's docdata folder.
[monitor://$SPLUNK_HOME/etc/apps/splunk_docs_search/appserver/static/docdata]
disabled   = false
index      = splunk_docs
sourcetype = splunk_docs
whitelist  = \.ndjson$
crcSalt    = <SOURCE>
