#
# Monitor input for the NDJSON shards written by ingest/fetch_splunk_docs.py.
#
# EDIT THE PATH BELOW to wherever you ran the crawler's --out directory.
# The stanza is disabled by default so the app installs cleanly; enable it
# (or set disabled = false) once the path is correct for your host.
#
# crcSalt = <SOURCE> ensures re-crawled files with the same header are still
# picked up as distinct sources.
#
[monitor:///opt/splunk/splunk_docs_ingest]
disabled   = true
index      = splunk_docs
sourcetype = splunk_docs
whitelist  = \.ndjson$
crcSalt    = <SOURCE>
