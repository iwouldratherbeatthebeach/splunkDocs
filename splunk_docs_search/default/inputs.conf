#
# Data input for the NDJSON produced by the crawler.
#
# AIRGAP-FRIENDLY DEFAULT: the app monitors its OWN ndjson/ folder, so the app
# package carries its data, PDFs, and config together — install the app on an
# offline Splunk and it just works (no external paths to configure).
# $SPLUNK_HOME is expanded by Splunk at load time.
#
[monitor://$SPLUNK_HOME/etc/apps/splunk_docs_search/ndjson]
disabled   = false
index      = splunk_docs
sourcetype = splunk_docs
whitelist  = \.ndjson$
crcSalt    = <SOURCE>

#
# ONLINE / EXTERNAL alternative: if you'd rather crawl to a path outside the app
# and ingest from there, disable the stanza above and enable one like this
# (edit the path to match the crawler's --out directory):
#
# [monitor:///opt/splunk/splunk_docs_ingest]
# disabled   = false
# index      = splunk_docs
# sourcetype = splunk_docs
# whitelist  = \.ndjson$
# crcSalt    = <SOURCE>
