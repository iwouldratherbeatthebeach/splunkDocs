# Custom REST endpoint backing the Configuration page.
# Reached from the browser at:
#   /<locale>/splunkd/__raw/servicesNS/nobody/splunk_docs_search/docs_admin/<member>
[script:docs_admin]
match                = /docs_admin
script               = docs_handler.py
scripttype           = persist
handler              = docs_handler.DocsAdminHandler
requireAuthentication = true
output_modes         = json
passPayload          = true
passHttpHeaders      = true
python.version       = python3
capability.get       = admin_all_objects
capability.post      = admin_all_objects
