#
# Dedicated index for Splunk documentation pages.
# Sizing note: the full portal is on the order of a few GB of text; 5 GB
# headroom is comfortable. Adjust maxTotalDataSizeMB for your retention needs.
# frozenTimePeriodInSecs is set high (10 years) because docs are reference
# material you rarely want auto-aged out.
#
[splunk_docs]
homePath   = $SPLUNK_DB/splunk_docs/db
coldPath   = $SPLUNK_DB/splunk_docs/colddb
thawedPath = $SPLUNK_DB/splunk_docs/thaweddb
maxTotalDataSizeMB = 5120
frozenTimePeriodInSecs = 315360000
