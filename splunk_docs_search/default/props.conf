#
# Sourcetype for the NDJSON produced by ingest/fetch_splunk_docs.py.
# One JSON object per line == one documentation page == one event.
# KV_MODE=json exposes category/title/url/version/pdf_file/etc. as fields at
# search time; the full JSON line is the searchable _raw. TRUNCATE=0 keeps big
# pages intact.
#
[splunk_docs]
SHOULD_LINEMERGE     = false
LINE_BREAKER         = ([\r\n]+)
KV_MODE              = json
AUTO_KV_JSON         = true
TRUNCATE             = 0
CHARSET              = UTF-8
category             = Custom
description          = Splunk documentation pages (NDJSON, one page per event)
TIMESTAMP_FIELDS     = last_modified
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S.%QZ
MAX_TIMESTAMP_LOOKAHEAD = 60
