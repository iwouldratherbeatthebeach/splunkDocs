[splunk_docs]
SHOULD_LINEMERGE     = false
LINE_BREAKER         = ([\r\n]+)
KV_MODE              = json
TRUNCATE             = 0
CHARSET              = UTF-8
category             = Custom
description          = Splunk documentation topics (NDJSON, one topic per event)
TIMESTAMP_FIELDS     = last_modified
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S.%QZ
MAX_TIMESTAMP_LOOKAHEAD = 60
