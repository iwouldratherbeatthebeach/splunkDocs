#
# Sourcetype for the NDJSON produced by ingest/fetch_splunk_docs.py.
# One JSON object per line == one documentation page == one event.
#
# We use search-time JSON field extraction (KV_MODE=json) so the whole JSON
# line is the searchable _raw event (great for free-text keyword search across
# the page body) while product/title/url/version/etc. are available as fields
# for filtering and table display. TRUNCATE=0 keeps large pages intact.
#
[splunk_docs]
SHOULD_LINEMERGE     = false
LINE_BREAKER         = ([\r\n]+)
KV_MODE              = json
AUTO_KV_JSON         = true
TRUNCATE             = 0
CHARSET              = UTF-8
category             = Custom
description          = Splunk documentation pages (NDJSON, one page per event)

# Use the page's own last-modified date as the event timestamp.
TIMESTAMP_FIELDS     = last_modified
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S.%QZ
MAX_TIMESTAMP_LOOKAHEAD = 60
