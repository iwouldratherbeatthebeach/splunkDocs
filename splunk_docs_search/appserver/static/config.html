<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Documentation Configuration</title>
  <style>
    :root{--bg:#f5f7fa;--panel:#fff;--fg:#1a1c20;--muted:#5b6770;--border:#e3e8ee;--accent:#65A637;--link:#3863A0}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);
      font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .od{max-width:960px;margin:0 auto;padding:24px}
    .od h1{font-size:22px;margin:0 0 4px}
    .od .lead{color:var(--muted);margin:0 0 20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
    .card.wide{grid-column:1/-1}
    .card h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
    dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:4px 12px}
    dt{color:var(--muted)}
    dd{margin:0}
    .actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid var(--border);background:#fff;color:var(--fg);border-radius:8px;
      padding:8px 14px;cursor:pointer;font-size:13px}
    .btn:hover{background:#f0f3f7}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn:disabled{opacity:.5;cursor:default}
    .badge{display:inline-block;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600}
    .badge.ok{background:#e6f2d9;color:#3c6e12}
    .badge.warn{background:#fdf0d5;color:#8a5a00}
    .badge.err{background:#fbe0e0;color:#a11}
    .log{background:#0f1216;color:#d6dde5;border-radius:8px;padding:12px;font:12px/1.5 monospace;
      max-height:240px;overflow:auto;white-space:pre-wrap}
    .bar{height:8px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:8px}
    .bar>i{display:block;height:100%;background:var(--accent);width:0}
    .muted{color:var(--muted)}
    .err{color:#a11}
  </style>
</head>
<body>
  <div id="app-root" class="od"><p class="muted">Loading…</p></div>
  <script src="config.js"></script>
</body>
</html>
